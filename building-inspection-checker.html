                          }}>
                            <div style={{
                              paddingTop: '16px',
                              display: 'grid',
                              gap: '12px'
                            }}>
                              <p style={{
                                margin: 0,
                                fontSize: '13px',
                                color: '#94a3b8',
                                lineHeight: '1.6'
                              }}>
                                {inspection.description}
                              </p>
                              
                              <div style={{
                                display: 'grid',
                                gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
                                gap: '12px'
                              }}>
                                <InfoItem label="根拠法令" value={inspection.law} />
                                <InfoItem label="届出先" value={inspection.reportTo} />
                                <InfoItem label="報告頻度" value={inspection.reportFrequency} />
                                <InfoItem label="費用目安" value={inspection.estimatedCost} highlight />
                                <InfoItem label="点検資格者" value={inspection.contractors} fullWidth />
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  
                  {filteredInspections.length === 0 && (
                    <div style={{
                      textAlign: 'center',
                      padding: '60px 20px',
                      color: '#64748b'
                    }}>
                      <span style={{ fontSize: '48px', display: 'block', marginBottom: '16px' }}>📋</span>
                      <p>該当する法定点検はありません</p>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* フッター */}
          <footer style={{
            textAlign: 'center',
            marginTop: '40px',
            padding: '20px',
            color: '#64748b',
            fontSize: '12px'
          }}>
            <p style={{ margin: '0 0 8px 0' }}>
              ⚠️ 本ツールは一般的な基準に基づく参考情報です。
            </p>
            <p style={{ margin: 0 }}>
              実際の点検義務は特定行政庁の判断や地域の条例により異なる場合があります。詳細は管轄の行政機関にご確認ください。
            </p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BuildingInspectionApp />);
  </script>
</body>
</html>
